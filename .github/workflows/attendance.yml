name: WFH Attendance Automation

on:
  schedule:
    - cron: '00 22 * * 0-4' # 6:00 AM PH (targets <7:00 AM with ~45min GH delay)
    - cron: '45 8 * * 1-5' # 4:45 PM PH (targets 4:30 PM with ~45min GH delay)
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Run script
        env:
          PORTAL_URL: ${{ secrets.PORTAL_URL }}
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: python main.py
